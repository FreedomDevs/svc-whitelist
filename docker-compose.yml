services:
  postgres:
    image: postgres:18-alpine
    container_name: svc-whitelist-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb

    volumes:
      - db:/var/lib/postgresql/data

    networks:
      net:
        ipv6_address: fd98:2dd6:8f48:1d99:8164:b5f6::3
  
  app-dev:
    container_name: svc-whitelist-app-dev
    build:
      context: .
      dockerfile: Dockerfile-test
    volumes:
      - ./app:/app:rw
    depends_on:
      - postgres
    cap_add:
      - NET_BIND_SERVICE

    networks:
      net:
        ipv6_address: fd98:2dd6:8f48:1d99:8164:b5f6::2

networks:
  net:
    enable_ipv6: true
    enable_ipv4: false
    driver_opts:
      com.docker.network.driver.mtu: "65535"
    ipam:
      config:
        - subnet: fd98:2dd6:8f48:1d99:8164:b5f6::/96

volumes:
  db:

